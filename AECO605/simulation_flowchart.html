<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simulation Study Methodology</title>
<style>
#sim-fc-wrap {
  width: 1280px;
  height: 630px;
  position: relative;
  background: #ffffff;
  overflow: hidden;
}
#sim-fc-wrap * { box-sizing: border-box; margin: 0; padding: 0; }

#sim-overlay {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.58);
  backdrop-filter: blur(2.5px);
  z-index: 90; display: none; cursor: pointer;
}
#sim-overlay.sim-vis { display: block; }

#sim-popup {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.93);
  width: 680px;
  background: #ffffff;
  border-radius: 14px;
  box-shadow: 0 16px 64px rgba(0,0,0,0.14), 0 2px 12px rgba(0,0,0,0.07);
  border: 1px solid #d8e6f0;
  padding: 32px 38px 28px;
  z-index: 100;
  display: none; opacity: 0;
  transition: opacity .22s ease, transform .22s ease;
  pointer-events: none;
  font-family: 'Poor Richard', 'Palatino Linotype', 'Book Antiqua', serif;
}
#sim-popup.sim-vis {
  display: block; opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: all;
}
#sim-close {
  position: absolute; top: 13px; right: 15px;
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid #c8d8e8; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #7892a8; font-size: 15px;
  transition: background .14s, color .14s;
  font-family: Arial, sans-serif; line-height: 1;
}
#sim-close:hover { background: #ecf3fa; color: #1a3a5a; }

#sim-pop-step {
  font-family: 'Poor Richard', serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  color: #1e9a55; margin-bottom: 8px;
}
#sim-pop-step.sim-dec { color: #a86820; }

#sim-pop-title {
  font-family: 'Poor Richard', 'Palatino Linotype', serif;
  font-size: 26px; color: #14263c;
  line-height: 1.28; margin-bottom: 14px;
}
#sim-pop-hr { height: 1px; background: #e4eef6; margin-bottom: 14px; }

#sim-pop-desc {
  font-family: 'Cambria Math', 'Cambria', Georgia, serif;
  font-size: 18px; line-height: 1.72; color: #48607a;
}
#sim-pop-tags {
  margin-top: 20px; display: flex; flex-wrap: wrap; gap: 12px;
}
.sim-tag {
  font-family: 'Poor Richard', serif;
  font-size: 15px; padding: 7px 22px; border-radius: 24px;
  border: 1px solid #ccdce8; color: #5880a0; background: #f4f8fc;
  white-space: nowrap; display: inline-block;
}
.sim-tag.sim-yes {
  border-color: rgba(30,145,80,.38); color: #1e9050;
  background: rgba(30,145,80,.07);
}
.sim-tag.sim-no {
  border-color: rgba(185,45,30,.35); color: #b32d1e;
  background: rgba(185,45,30,.06);
}
</style>
</head>
<body>

<script>
(function () {
  'use strict';
  var DATA = [
    { id:1,  type:'rect',     label:'Formulate problem & plan the study',
      desc:'The problem is stated by a manager, though it may not initially be in quantitative terms — iteration is often necessary. A kickoff meeting is held with the project manager, analysts, and SMEs to define study objectives, performance measures, model scope, system configurations, time frame, and required resources.',
      conns:[{to:2,lbl:'Next'}] },
    { id:2,  type:'rect',     label:'Collect data & define a model',
      desc:'Collect information on system structure and operating procedures — no single person or document is sufficient. Gather data for model parameters and input distributions, and record everything in a written assumptions document. Start with a simple model and embellish as needed; excessive detail can obscure important factors.',
      conns:[{to:3,lbl:'Next'}] },
    { id:3,  type:'decision', label:'Assumptions doc. valid?',
      desc:'Conduct a structured walk-through of the assumptions document before managers, analysts, and SMEs. This ensures assumptions are correct and complete, promotes team interaction and model ownership, and must occur before programming begins — avoiding costly reprogramming later.',
      conns:[{to:4,lbl:'Yes'},{to:2,lbl:'No'}] },
    { id:4,  type:'rect',     label:'Construct program & verify',
      desc:'Program the model in a simulation language such as C++ or Java, or in dedicated software such as Arena, ExtendSim, or ProModel. Simulation software reduces programming time and project cost. Verify (debug) the computer program using structured techniques: modular development, test cases, and animation checks.',
      conns:[{to:5,lbl:'Next'}] },
    { id:5,  type:'rect',     label:'Make pilot runs',
      desc:'Execute pilot simulation runs to generate output data for the next validation step. These preliminary runs reveal anomalous behaviour early and support sensitivity analysis to identify which model factors have a significant impact on performance measures.',
      conns:[{to:6,lbl:'Next'}] },
    { id:6,  type:'decision', label:'Programmed model valid?',
      desc:'If an existing system is available, compare model and system performance measures. Analysts and SMEs should review results for correctness. Use sensitivity analyses to identify factors with significant impact. If the model is not valid, return to Step 2 to refine data collection and model assumptions.',
      conns:[{to:7,lbl:'Yes'},{to:2,lbl:'No'}] },
    { id:7,  type:'rect',     label:'Design experiments',
      desc:'For each system configuration of interest, specify: the length of each simulation run, the warmup period length (if appropriate), and the number of independent runs using different random numbers — which facilitates the construction of valid confidence intervals for performance measures.',
      conns:[{to:8,lbl:'Next'}] },
    { id:8,  type:'rect',     label:'Make production runs',
      desc:'Execute the full set of production runs as designed in Step 7. Each run of a stochastic model produces only estimates, so multiple independent replications using different random numbers are required to generate the output data needed for statistical analysis.',
      conns:[{to:9,lbl:'Next'}] },
    { id:9,  type:'rect',     label:'Analyze output data',
      desc:'Two major objectives: (1) determine the absolute performance of certain system configurations, and (2) compare alternative configurations in a relative sense. Since simulation output is nonstationary and autocorrelated, classical IID-based statistics are not directly applicable.',
      conns:[{to:10,lbl:'Next'}] },
    { id:10, type:'rect',     label:'Document, present & use results',
      desc:'Document the assumptions, computer program, and study results for use in current and future projects. Use animation to communicate the model to managers unfamiliar with its details. Discuss the validation process to promote credibility. Results enter the decision-making process only when both valid and credible.',
      conns:[] }
  ];

  var wrap     = document.getElementById('sim-fc-wrap');
  var popup    = document.getElementById('sim-popup');
  var overlay  = document.getElementById('sim-overlay');
  var closeBtn = document.getElementById('sim-close');
  var stepEl   = document.getElementById('sim-pop-step');
  var titleEl  = document.getElementById('sim-pop-title');
  var descEl   = document.getElementById('sim-pop-desc');
  var tagsEl   = document.getElementById('sim-pop-tags');

  function openPopup(id) {
    var d = DATA[id - 1];
    var isDec = d.type === 'decision';
    stepEl.textContent  = 'Step ' + id + (isDec ? '  ·  Decision' : '');
    stepEl.className    = isDec ? 'sim-dec' : '';
    titleEl.textContent = d.label;
    descEl.textContent  = d.desc;
    tagsEl.innerHTML    = '';
    if (!d.conns.length) {
      var s = document.createElement('span');
      s.className = 'sim-tag'; s.textContent = 'End of process';
      tagsEl.appendChild(s);
    } else {
      d.conns.forEach(function (c) {
        var s  = document.createElement('span');
        var lc = c.lbl.toLowerCase();
        s.className   = 'sim-tag' + (lc==='yes' ? ' sim-yes' : lc==='no' ? ' sim-no' : '');
        s.textContent = c.lbl + ' \u2192 Step ' + c.to;
        tagsEl.appendChild(s);
      });
    }
    overlay.classList.add('sim-vis');
    popup.style.display = 'block';
    requestAnimationFrame(function () {
      requestAnimationFrame(function () { popup.classList.add('sim-vis'); });
    });
  }

  function closePopup() {
    popup.classList.remove('sim-vis');
    overlay.classList.remove('sim-vis');
    setTimeout(function () { popup.style.display = 'none'; }, 230);
  }

  wrap.querySelectorAll('.sim-node').forEach(function (g) {
    g.addEventListener('click', function (e) {
      e.stopPropagation();
      openPopup(parseInt(g.getAttribute('data-id'), 10));
    });
  });
  closeBtn.addEventListener('click', closePopup);
  overlay.addEventListener('click',  closePopup);
}());
</script>
</body>
</html>
